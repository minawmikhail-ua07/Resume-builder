<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resume Builder</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  /* ── Reset & Variables ───────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --accent: #1a5c8b;
    --accent-light: #e8f2f9;
    --surface: #f7f8fa;
    --panel: #ffffff;
    --border: #e2e5ea;
    --text: #1c2333;
    --muted: #6b7280;
    --sidebar-w: 420px;
    --radius: 10px;
    --shadow: 0 2px 14px rgba(0,0,0,.07);
    --font-preview: 'Calibri', 'Gill Sans', sans-serif;
  }

  html, body { height: 100%; overflow: hidden; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--surface);
    color: var(--text);
    display: flex;
    flex-direction: column;
  }

  /* ── Top Bar ─────────────────────────────────────────────────── */
  .topbar {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 10px 24px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    flex-wrap: wrap;
  }

  .topbar-logo {
    font-family: 'DM Serif Display', serif;
    font-size: 1.25rem;
    color: var(--accent);
    letter-spacing: -.3px;
    margin-right: 8px;
  }

  .topbar-divider {
    width: 1px;
    height: 28px;
    background: var(--border);
  }

  .ctrl-group {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .ctrl-label {
    font-size: .72rem;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .05em;
  }

  select.ctrl-select {
    padding: 5px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--surface);
    font-family: 'DM Sans', sans-serif;
    font-size: .82rem;
    color: var(--text);
    cursor: pointer;
    outline: none;
    transition: border-color .2s;
  }
  select.ctrl-select:focus { border-color: var(--accent); }

  .ctrl-color-wrap {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  input[type="color"] {
    width: 32px;
    height: 32px;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 2px;
    cursor: pointer;
    background: none;
    outline: none;
  }

  .btn {
    padding: 7px 16px;
    border: none;
    border-radius: 7px;
    font-family: 'DM Sans', sans-serif;
    font-size: .82rem;
    font-weight: 600;
    cursor: pointer;
    transition: all .18s;
  }
  .btn-primary {
    background: var(--accent);
    color: #fff;
    margin-left: auto;
  }
  .btn-primary:hover { filter: brightness(1.12); }
  .btn-secondary {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { background: var(--border); }

  /* ── Main Layout ─────────────────────────────────────────────── */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── Sidebar (Form) ──────────────────────────────────────────── */
  .sidebar {
    width: var(--sidebar-w);
    flex-shrink: 0;
    background: var(--panel);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 20px 20px 40px;
  }

  .sidebar::-webkit-scrollbar { width: 5px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

  /* ── Accordion ───────────────────────────────────────────────── */
  .section-card {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 10px;
    overflow: hidden;
  }

  .section-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 11px 14px;
    background: var(--surface);
    cursor: pointer;
    user-select: none;
    font-size: .85rem;
    font-weight: 600;
    transition: background .15s;
  }
  .section-header:hover { background: #eff1f4; }

  .section-header .icon {
    width: 22px;
    height: 22px;
    background: var(--accent-light);
    border-radius: 5px;
    display: grid;
    place-items: center;
    color: var(--accent);
    font-size: .75rem;
    flex-shrink: 0;
  }

  .section-header .chevron {
    margin-left: auto;
    color: var(--muted);
    transition: transform .2s;
    font-size: .75rem;
  }
  .section-card.open .chevron { transform: rotate(180deg); }

  .section-body {
    display: none;
    padding: 14px;
    border-top: 1px solid var(--border);
    background: var(--panel);
  }
  .section-card.open .section-body { display: block; }

  /* ── Form Elements ───────────────────────────────────────────── */
  .field-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .field {
    margin-bottom: 10px;
  }
  .field:last-child { margin-bottom: 0; }

  label {
    display: block;
    font-size: .73rem;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .04em;
    margin-bottom: 4px;
  }

  input[type="text"],
  input[type="email"],
  input[type="tel"],
  input[type="url"],
  textarea {
    width: 100%;
    padding: 7px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-family: 'DM Sans', sans-serif;
    font-size: .82rem;
    color: var(--text);
    background: var(--surface);
    outline: none;
    transition: border-color .2s, box-shadow .2s;
    resize: vertical;
  }
  input:focus, textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(26,92,139,.1);
  }
  textarea { min-height: 72px; }

  /* ── Repeatable entries ──────────────────────────────────────── */
  .entry {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    margin-bottom: 10px;
    position: relative;
  }
  .entry-title {
    font-size: .77rem;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 10px;
    text-transform: uppercase;
    letter-spacing: .04em;
  }
  .btn-remove {
    position: absolute;
    top: 10px;
    right: 10px;
    background: #fee2e2;
    color: #dc2626;
    border: none;
    border-radius: 5px;
    width: 22px;
    height: 22px;
    font-size: .8rem;
    cursor: pointer;
    display: grid;
    place-items: center;
    transition: background .15s;
  }
  .btn-remove:hover { background: #fecaca; }

  .btn-add {
    width: 100%;
    padding: 7px;
    background: var(--accent-light);
    color: var(--accent);
    border: 1px dashed var(--accent);
    border-radius: 7px;
    font-family: 'DM Sans', sans-serif;
    font-size: .8rem;
    font-weight: 600;
    cursor: pointer;
    transition: background .15s;
    margin-top: 4px;
  }
  .btn-add:hover { background: #d3e9f7; }

  /* ── Preview Pane ────────────────────────────────────────────── */
  .preview-pane {
    flex: 1;
    background: #d4d8de;
    overflow-y: auto;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 32px 24px;
  }

  .preview-pane::-webkit-scrollbar { width: 6px; }
  .preview-pane::-webkit-scrollbar-track { background: transparent; }
  .preview-pane::-webkit-scrollbar-thumb { background: #b0b5be; border-radius: 10px; }

  /* ── Resume Document ─────────────────────────────────────────── */
  #resume {
    width: 794px; /* A4 width at 96dpi */
    min-height: 1123px;
    background: #fff;
    box-shadow: 0 4px 32px rgba(0,0,0,.18);
    border-radius: 3px;
    padding: 56px 60px;
    font-family: var(--font-preview);
    font-size: 10.5pt;
    line-height: 1.5;
    color: #1c2333;
  }

  /* ── Resume Header ───────────────────────────────────────────── */
  #resume header {
    border-bottom: 2.5px solid var(--accent);
    padding-bottom: 16px;
    margin-bottom: 20px;
  }

  #resume .r-name {
    font-size: 26pt;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: -.4px;
    line-height: 1.1;
    margin-bottom: 6px;
  }

  #resume .r-contact {
    display: flex;
    flex-wrap: wrap;
    gap: 4px 18px;
    font-size: 9pt;
    color: #4b5563;
  }

  #resume .r-contact span::before {
    content: attr(data-icon) ' ';
  }

  #resume .r-contact a {
    color: var(--accent);
    text-decoration: none;
  }
  #resume .r-contact a:hover { text-decoration: underline; }

  /* ── Resume Sections ─────────────────────────────────────────── */
  #resume section {
    margin-bottom: 20px;
  }

  #resume h2 {
    font-size: 9pt;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .1em;
    color: var(--accent);
    border-bottom: 1px solid var(--accent);
    padding-bottom: 3px;
    margin-bottom: 10px;
  }

  /* Summary */
  #resume .r-summary p {
    font-size: 10pt;
    color: #374151;
  }

  /* Experience */
  #resume article {
    margin-bottom: 14px;
  }
  #resume article:last-child { margin-bottom: 0; }

  #resume .r-job-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    flex-wrap: wrap;
    gap: 4px;
  }

  #resume h3 {
    font-size: 10.5pt;
    font-weight: 700;
    color: #1c2333;
  }

  #resume .r-company {
    font-size: 10pt;
    font-weight: 600;
    color: var(--accent);
  }

  #resume .r-dates {
    font-size: 9pt;
    color: #6b7280;
    white-space: nowrap;
  }

  #resume ul {
    margin-top: 5px;
    padding-left: 18px;
  }

  #resume ul li {
    font-size: 9.5pt;
    color: #374151;
    margin-bottom: 3px;
    list-style-type: disc;
  }

  #resume ul li::marker {
    color: var(--accent);
  }

  /* Education */
  #resume .r-edu-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    flex-wrap: wrap;
  }

  #resume .r-degree {
    font-weight: 700;
    font-size: 10.5pt;
  }

  #resume .r-school {
    font-size: 10pt;
    color: var(--accent);
    font-weight: 600;
  }

  #resume .r-coursework {
    font-size: 9pt;
    color: #6b7280;
    margin-top: 2px;
  }

  /* Skills */
  #resume .r-skills-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  #resume .r-skill-tag {
    background: var(--accent-light);
    color: var(--accent);
    border: 1px solid color-mix(in srgb, var(--accent) 30%, transparent);
    padding: 2px 10px;
    border-radius: 20px;
    font-size: 9pt;
    font-weight: 500;
  }

  /* Empty state */
  .r-placeholder {
    color: #c0c7d0;
    font-style: italic;
    font-size: 9.5pt;
  }

  /* ── Print ───────────────────────────────────────────────────── */
  @media print {
    body { overflow: visible; }
    .topbar, .sidebar { display: none; }
    .preview-pane {
      padding: 0;
      background: #fff;
      overflow: visible;
    }
    #resume {
      box-shadow: none;
      border-radius: 0;
      width: 100%;
      min-height: unset;
    }
  }

  /* ── Responsive ──────────────────────────────────────────────── */
  @media (max-width: 900px) {
    html, body { overflow: auto; }
    .main { flex-direction: column; overflow: visible; }
    .sidebar { width: 100%; overflow: visible; border-right: none; border-bottom: 1px solid var(--border); }
    .preview-pane { padding: 16px 8px; }
    #resume { width: 100%; padding: 28px 20px; }
  }
</style>
</head>
<body>

<!-- ── Top Bar ──────────────────────────────────────────────────── -->
<div class="topbar">
  <span class="topbar-logo">✦ ResumeForge</span>
  <div class="topbar-divider"></div>

  <div class="ctrl-group">
    <span class="ctrl-label">Font</span>
    <select class="ctrl-select" id="fontSelect">
      <option value="'Calibri','Gill Sans',sans-serif">Calibri</option>
      <option value="Arial,Helvetica,sans-serif">Arial</option>
      <option value="'Lato','Helvetica Neue',sans-serif">Lato</option>
      <option value="Georgia,'Times New Roman',serif">Georgia</option>
      <option value="'Garamond','EB Garamond',serif">Garamond</option>
      <option value="'Trebuchet MS',sans-serif">Trebuchet MS</option>
    </select>
  </div>

  <div class="topbar-divider"></div>

  <div class="ctrl-group">
    <span class="ctrl-label">Accent Color</span>
    <div class="ctrl-color-wrap">
      <input type="color" id="colorPicker" value="#1a5c8b">
    </div>
  </div>

  <div class="ctrl-group" style="gap:6px">
    <button class="btn btn-secondary" onclick="clearAll()">Clear All</button>
    <button class="btn btn-primary" onclick="window.print()">⬇ Print / Save PDF</button>
  </div>
</div>

<!-- ── Main ─────────────────────────────────────────────────────── -->
<div class="main">

  <!-- ── Sidebar ────────────────────────────────────────────────── -->
  <aside class="sidebar" aria-label="Resume input form">

    <!-- Personal Info -->
    <div class="section-card open" id="card-personal">
      <div class="section-header" onclick="toggleCard('card-personal')">
        <span class="icon">👤</span> Personal Information
        <span class="chevron">▼</span>
      </div>
      <div class="section-body">
        <div class="field">
          <label for="fullName">Full Name</label>
          <input type="text" id="fullName" placeholder="Jane Doe" autocomplete="name">
        </div>
        <div class="field-row">
          <div class="field">
            <label for="phone">Phone</label>
            <input type="tel" id="phone" placeholder="+1 (555) 000-0000" autocomplete="tel">
          </div>
          <div class="field">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="jane@example.com" autocomplete="email">
          </div>
        </div>
        <div class="field">
          <label for="linkedin">LinkedIn / Portfolio URL</label>
          <input type="url" id="linkedin" placeholder="https://linkedin.com/in/janedoe">
        </div>
        <div class="field">
          <label for="location">Location (City, State)</label>
          <input type="text" id="location" placeholder="San Francisco, CA">
        </div>
      </div>
    </div>

    <!-- Summary -->
    <div class="section-card open" id="card-summary">
      <div class="section-header" onclick="toggleCard('card-summary')">
        <span class="icon">📝</span> Professional Summary
        <span class="chevron">▼</span>
      </div>
      <div class="section-body">
        <div class="field">
          <label for="summary">Summary / Objective</label>
          <textarea id="summary" rows="4" placeholder="Results-driven professional with X years of experience in…"></textarea>
        </div>
      </div>
    </div>

    <!-- Experience -->
    <div class="section-card open" id="card-experience">
      <div class="section-header" onclick="toggleCard('card-experience')">
        <span class="icon">💼</span> Work Experience
        <span class="chevron">▼</span>
      </div>
      <div class="section-body">
        <div id="experienceEntries"></div>
        <button class="btn-add" onclick="addExperience()">+ Add Position</button>
      </div>
    </div>

    <!-- Education -->
    <div class="section-card open" id="card-education">
      <div class="section-header" onclick="toggleCard('card-education')">
        <span class="icon">🎓</span> Education
        <span class="chevron">▼</span>
      </div>
      <div class="section-body">
        <div id="educationEntries"></div>
        <button class="btn-add" onclick="addEducation()">+ Add Education</button>
      </div>
    </div>

    <!-- Skills -->
    <div class="section-card open" id="card-skills">
      <div class="section-header" onclick="toggleCard('card-skills')">
        <span class="icon">⚡</span> Skills
        <span class="chevron">▼</span>
      </div>
      <div class="section-body">
        <div class="field">
          <label for="skills">Skills (comma-separated)</label>
          <textarea id="skills" rows="3" placeholder="JavaScript, Python, Project Management, Figma, SQL…"></textarea>
        </div>
      </div>
    </div>

  </aside>

  <!-- ── Preview ─────────────────────────────────────────────────── -->
  <main class="preview-pane" aria-label="Resume live preview">
    <div id="resume" role="document" aria-label="Generated resume">

      <!-- Header -->
      <header>
        <div class="r-name" id="rv-name">Your Name</div>
        <address class="r-contact" id="rv-contact" aria-label="Contact information"></address>
      </header>

      <!-- Summary -->
      <section class="r-summary" id="rv-summary-section" aria-labelledby="rv-summary-heading">
        <h2 id="rv-summary-heading">Professional Summary</h2>
        <p id="rv-summary"></p>
      </section>

      <!-- Experience -->
      <section id="rv-experience-section" aria-labelledby="rv-experience-heading">
        <h2 id="rv-experience-heading">Work Experience</h2>
        <div id="rv-experience"></div>
      </section>

      <!-- Education -->
      <section id="rv-education-section" aria-labelledby="rv-education-heading">
        <h2 id="rv-education-heading">Education</h2>
        <div id="rv-education"></div>
      </section>

      <!-- Skills -->
      <section id="rv-skills-section" aria-labelledby="rv-skills-heading">
        <h2 id="rv-skills-heading">Skills</h2>
        <div class="r-skills-grid" id="rv-skills"></div>
      </section>

    </div>
  </main>
</div>

<script>
// ── State ────────────────────────────────────────────────────────
let expCount = 0;
let eduCount = 0;

// ── Accordion ────────────────────────────────────────────────────
function toggleCard(id) {
  document.getElementById(id).classList.toggle('open');
}

// ── Color & Font ─────────────────────────────────────────────────
document.getElementById('colorPicker').addEventListener('input', function() {
  const hex = this.value;
  document.documentElement.style.setProperty('--accent', hex);
  // Derive a light tint for tags
  document.documentElement.style.setProperty('--accent-light', hex + '1a');
});

document.getElementById('fontSelect').addEventListener('change', function() {
  document.getElementById('resume').style.fontFamily = this.value;
});

// ── Helpers ──────────────────────────────────────────────────────
function esc(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function val(id) {
  const el = document.getElementById(id);
  return el ? el.value.trim() : '';
}

function placeholder(text) {
  return `<span class="r-placeholder">${text}</span>`;
}

// ── Live Update ──────────────────────────────────────────────────
function update() {
  // Name
  const name = val('fullName');
  document.getElementById('rv-name').textContent = name || 'Your Name';

  // Contact
  const phone = val('phone');
  const email = val('email');
  const linkedin = val('linkedin');
  const location = val('location');

  let contactHTML = '';
  if (location) contactHTML += `<span data-icon="📍">${esc(location)}</span>`;
  if (phone)    contactHTML += `<span data-icon="📞">${esc(phone)}</span>`;
  if (email)    contactHTML += `<span data-icon="✉">​<a href="mailto:${esc(email)}">${esc(email)}</a></span>`;
  if (linkedin) contactHTML += `<span data-icon="🔗"><a href="${esc(linkedin)}" target="_blank" rel="noopener">${esc(linkedin.replace(/^https?:\/\//,''))}</a></span>`;
  document.getElementById('rv-contact').innerHTML = contactHTML || placeholder('Phone · Email · LinkedIn');

  // Summary
  const summaryEl = document.getElementById('rv-summary');
  const summary = val('summary');
  summaryEl.innerHTML = summary ? esc(summary).replace(/\n/g,'<br>') : placeholder('A brief professional summary will appear here…');
  const sumSec = document.getElementById('rv-summary-section');
  sumSec.style.display = '';

  // Experience
  let expHTML = '';
  const expEntries = document.querySelectorAll('.exp-entry');
  expEntries.forEach(function(entry) {
    const idx = entry.dataset.idx;
    const title   = val('exp-title-' + idx);
    const company = val('exp-company-' + idx);
    const start   = val('exp-start-' + idx);
    const end     = val('exp-end-' + idx);
    const bullets = val('exp-bullets-' + idx);

    if (!title && !company) return;

    const dateRange = [start, end || 'Present'].filter(Boolean).join(' – ');
    const bulletList = bullets
      ? bullets.split('\n').filter(b => b.trim())
          .map(b => `<li>${esc(b.trim())}</li>`).join('')
      : '';

    expHTML += `
      <article>
        <div class="r-job-header">
          <div>
            <h3>${esc(title) || placeholder('Job Title')}</h3>
            <div class="r-company">${esc(company) || placeholder('Company Name')}</div>
          </div>
          <div class="r-dates">${esc(dateRange)}</div>
        </div>
        ${bulletList ? `<ul>${bulletList}</ul>` : ''}
      </article>`;
  });
  const rvExp = document.getElementById('rv-experience');
  rvExp.innerHTML = expHTML || placeholder('Add work experience using the form on the left.');
  document.getElementById('rv-experience-section').style.display = '';

  // Education
  let eduHTML = '';
  const eduEntries = document.querySelectorAll('.edu-entry');
  eduEntries.forEach(function(entry) {
    const idx = entry.dataset.idx;
    const degree  = val('edu-degree-' + idx);
    const school  = val('edu-school-' + idx);
    const gradDate= val('edu-grad-' + idx);
    const courses = val('edu-courses-' + idx);

    if (!degree && !school) return;

    eduHTML += `
      <article>
        <div class="r-edu-header">
          <div>
            <div class="r-degree">${esc(degree) || placeholder('Degree & Field of Study')}</div>
            <div class="r-school">${esc(school) || placeholder('Institution Name')}</div>
            ${courses ? `<div class="r-coursework">Relevant Coursework: ${esc(courses)}</div>` : ''}
          </div>
          <div class="r-dates">${esc(gradDate)}</div>
        </div>
      </article>`;
  });
  document.getElementById('rv-education').innerHTML = eduHTML || placeholder('Add education using the form on the left.');

  // Skills
  const skillsRaw = val('skills');
  let skillsHTML = '';
  if (skillsRaw) {
    skillsRaw.split(',').forEach(function(s) {
      const t = s.trim();
      if (t) skillsHTML += `<span class="r-skill-tag">${esc(t)}</span>`;
    });
  }
  document.getElementById('rv-skills').innerHTML = skillsHTML || placeholder('JavaScript, Python, Leadership…');
}

// ── Add / Remove Experience ───────────────────────────────────────
function addExperience() {
  expCount++;
  const idx = expCount;
  const container = document.getElementById('experienceEntries');
  const div = document.createElement('div');
  div.className = 'entry exp-entry';
  div.dataset.idx = idx;
  div.innerHTML = `
    <div class="entry-title">Position ${idx}</div>
    <button class="btn-remove" onclick="removeEntry(this)" title="Remove">✕</button>
    <div class="field-row">
      <div class="field">
        <label for="exp-title-${idx}">Job Title</label>
        <input type="text" id="exp-title-${idx}" placeholder="Software Engineer">
      </div>
      <div class="field">
        <label for="exp-company-${idx}">Company</label>
        <input type="text" id="exp-company-${idx}" placeholder="Acme Corp">
      </div>
    </div>
    <div class="field-row">
      <div class="field">
        <label for="exp-start-${idx}">Start Date</label>
        <input type="text" id="exp-start-${idx}" placeholder="Jan 2022">
      </div>
      <div class="field">
        <label for="exp-end-${idx}">End Date</label>
        <input type="text" id="exp-end-${idx}" placeholder="Present">
      </div>
    </div>
    <div class="field">
      <label for="exp-bullets-${idx}">Bullet Points (one per line)</label>
      <textarea id="exp-bullets-${idx}" rows="4" placeholder="Led a team of 5 engineers to deliver…&#10;Reduced load time by 40% through…"></textarea>
    </div>`;
  container.appendChild(div);
  attachListeners(div);
  update();
}

// ── Add / Remove Education ────────────────────────────────────────
function addEducation() {
  eduCount++;
  const idx = eduCount;
  const container = document.getElementById('educationEntries');
  const div = document.createElement('div');
  div.className = 'entry edu-entry';
  div.dataset.idx = idx;
  div.innerHTML = `
    <div class="entry-title">Education ${idx}</div>
    <button class="btn-remove" onclick="removeEntry(this)" title="Remove">✕</button>
    <div class="field">
      <label for="edu-degree-${idx}">Degree & Field of Study</label>
      <input type="text" id="edu-degree-${idx}" placeholder="B.S. Computer Science">
    </div>
    <div class="field">
      <label for="edu-school-${idx}">School / University</label>
      <input type="text" id="edu-school-${idx}" placeholder="University of California, Berkeley">
    </div>
    <div class="field-row">
      <div class="field">
        <label for="edu-grad-${idx}">Graduation Date</label>
        <input type="text" id="edu-grad-${idx}" placeholder="May 2020">
      </div>
    </div>
    <div class="field">
      <label for="edu-courses-${idx}">Relevant Coursework (optional)</label>
      <input type="text" id="edu-courses-${idx}" placeholder="Data Structures, Algorithms, Machine Learning">
    </div>`;
  container.appendChild(div);
  attachListeners(div);
  update();
}

function removeEntry(btn) {
  btn.closest('.entry').remove();
  update();
}

// ── Bind Inputs ──────────────────────────────────────────────────
function attachListeners(root) {
  root.querySelectorAll('input, textarea').forEach(function(el) {
    el.addEventListener('input', update);
  });
}

// ── Global Input Listeners ────────────────────────────────────────
document.querySelectorAll('#fullName,#phone,#email,#linkedin,#location,#summary,#skills').forEach(function(el) {
  el.addEventListener('input', update);
});

// ── Clear All ────────────────────────────────────────────────────
function clearAll() {
  if (!confirm('Clear all resume data?')) return;
  document.querySelectorAll('input[type="text"], input[type="email"], input[type="tel"], input[type="url"], textarea').forEach(function(el) {
    el.value = '';
  });
  document.getElementById('experienceEntries').innerHTML = '';
  document.getElementById('educationEntries').innerHTML = '';
  expCount = 0;
  eduCount = 0;
  update();
}

// ── Init: seed with one entry each ───────────────────────────────
addExperience();
addEducation();
update();
</script>
</body>
</html>
